name: Pact Provider Verification

on:
  workflow_call:
    inputs:
      publish-verification:
        type: boolean
        default: false

jobs:
  pact:
    name: Verify Pacts
    runs-on: self-hosted

    steps:
      - name: Mask secrets
        run: |
          echo "::add-mask::$PACT_USER"
          echo "::add-mask::$PACT_PASS"

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Fetch latest tags
        run: git fetch --tags --force

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        env:
          PACT_BROKER_BASE_URL: https://ffc-pact-broker.azure.defra.cloud
          PACT_PUBLISH_VERIFICATION: ${{ inputs.publish-verification }}
        run: |
          SERVICE_VERSION=$(git describe --tags --abbrev=0) \
          PACT_BROKER_USERNAME="$PACT_USER" \
          PACT_BROKER_PASSWORD="$PACT_PASS" \
          npm run test:contracts
