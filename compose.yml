services:
  grants-ui-backend:
    build:
      context: .
      target: development
    ports:
      - "3001:3001"
    links:
      - "mongodb:mongodb"
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-ready:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
      grants-config-broker:
        condition: service_healthy
    env_file:
      - 'localstack/aws.env'
    environment:
      PORT: 3001
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/
      GRANTS_UI_BACKEND_AUTH_TOKEN: '${GRANTS_UI_BACKEND_AUTH_TOKEN:-auth-token}'
      GRANTS_UI_BACKEND_ENCRYPTION_KEY: '${GRANTS_UI_BACKEND_ENCRYPTION_KEY:-encryption-key}'
      APPLICATION_LOCK_TOKEN_SECRET: '${APPLICATION_LOCK_TOKEN_SECRET:-application-lock-token-secret}'
      AWS_ENDPOINT_URL: http://localstack:4566
      CONFIG_BROKER_BASE_URL: http://grants-config-broker:3012
      GRANTS_CONFIG_BROKER_AUTH_TOKEN: '${GRANTS_CONFIG_BROKER_AUTH_TOKEN:-config-broker-auth-token}'
      GRANTS_CONFIG_BROKER_ENCRYPTION_KEY: '${GRANTS_CONFIG_BROKER_ENCRYPTION_KEY:-config-broker-encryption-key}'
      CONFIG_INGEST_SQS_QUEUE_URL: http://localstack:4566/000000000000/grants_ui_backend__sqs__config_updates
    networks:
      - grants-ui-net
    volumes:
      - ./src:/home/node/src
      - ./package.json:/home/node/package.json

  grants-config-broker:
    image: defradigital/grants-config-broker:latest
    pull_policy: always
    ports:
      - '3012:3012'
    depends_on:
      localstack:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mongo-ready:
        condition: service_completed_successfully
    env_file:
      - 'localstack/aws.env'
    environment:
      PORT: 3012
      NODE_ENV: development
      AWS_ENDPOINT_URL: http://localstack:4566
      CONFIG_BUCKET_NAME: configs-bucket
      GRANTS_CONFIG_BROKER_AUTH_TOKEN: '${GRANTS_CONFIG_BROKER_AUTH_TOKEN:-config-broker-auth-token}'
      GRANTS_CONFIG_BROKER_ENCRYPTION_KEY: '${GRANTS_CONFIG_BROKER_ENCRYPTION_KEY:-config-broker-encryption-key}'
      MONGO_URI: mongodb://mongodb:27017/
      SERVICE_VERSION: 1.0.0
    networks:
      - grants-ui-net
    volumes:
      - ./localstack/config-broker-local:/home/node/config
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3012/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongodb:
    image: mongo:7.0
    networks:
      - grants-ui-net
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: ['mongod', '--replSet', 'mongoRepl', '--bind_ip', 'localhost,mongodb']
    restart: always

  mongo-ready:
    image: mongo:7.0
    networks: [grants-ui-net]
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PRIMARY: 'mongodb:27017'
      REPLSET: 'mongoRepl'
    volumes:
      - ./scripts/wait-for-replicaset.sh:/wait-for-replicaset.sh:ro
    entrypoint: ['/bin/bash', '/wait-for-replicaset.sh']

  localstack:
    image: localstack/localstack:4.14.0
    ports:
      - '4566:4566'
      - '4510-4559:4510-4559'
    env_file:
      - 'localstack/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN
      SERVICES: s3,sqs,sns,firehose
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - grants-ui-net

volumes:
  mongodb-data:
  mongodb-config:
  localstack-data:

networks:
  grants-ui-net:
    driver: bridge
    name: grants-ui-net
