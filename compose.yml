services:
  grants-ui-backend:
    build:
      context: .
      target: development
    ports:
      - "3001:3001"
    links:
      - "mongodb:mongodb"
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-ready:
        condition: service_completed_successfully
      floci:
        condition: service_healthy
      grants-config-broker:
        condition: service_healthy
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 3001
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/
      GRANTS_UI_BACKEND_AUTH_TOKEN: '${GRANTS_UI_BACKEND_AUTH_TOKEN:-auth-token}'
      GRANTS_UI_BACKEND_ENCRYPTION_KEY: '${GRANTS_UI_BACKEND_ENCRYPTION_KEY:-encryption-key}'
      APPLICATION_LOCK_TOKEN_SECRET: '${APPLICATION_LOCK_TOKEN_SECRET:-application-lock-token-secret}'
      PURGE_UNSUBMITTED_APPLICATIONS: '${PURGE_UNSUBMITTED_APPLICATIONS:-}'
      AWS_ENDPOINT_URL: http://floci:4566
      CONFIG_BROKER_BASE_URL: http://grants-config-broker:3012
      GRANTS_CONFIG_BROKER_AUTH_TOKEN: '${GRANTS_CONFIG_BROKER_AUTH_TOKEN:-config-broker-auth-token}'
      GRANTS_CONFIG_BROKER_ENCRYPTION_KEY: '${GRANTS_CONFIG_BROKER_ENCRYPTION_KEY:-config-broker-encryption-key}'
      CONFIG_INGEST_SQS_QUEUE_URL: http://floci:4566/000000000000/grants_ui_backend__sqs__config_updates
      GRANTS_UI_BASE_URL: '${GRANTS_UI_BASE_URL:-http://localhost:3000}'
      ENCRYPTED_AUTH_JWT_SECRET: ${ENCRYPTED_AUTH_JWT_SECRET:-allowlist-jwt-secret}
    networks:
      - grants-ui-net
    volumes:
      - ./src:/home/node/src
      - ./package.json:/home/node/package.json
      - ./openapi.yaml:/home/node/openapi.yaml

  grants-config-broker:
    image: defradigital/grants-config-broker:latest
    pull_policy: always
    ports:
      - '3012:3012'
    depends_on:
      floci:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mongo-ready:
        condition: service_completed_successfully
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 3012
      NODE_ENV: development
      AWS_ENDPOINT_URL: http://floci:4566
      CONFIG_BUCKET_NAME: configs-bucket
      GRANTS_CONFIG_BROKER_AUTH_TOKEN: '${GRANTS_CONFIG_BROKER_AUTH_TOKEN:-config-broker-auth-token}'
      GRANTS_CONFIG_BROKER_ENCRYPTION_KEY: '${GRANTS_CONFIG_BROKER_ENCRYPTION_KEY:-config-broker-encryption-key}'
      MONGO_URI: mongodb://mongodb:27017/
      SERVICE_VERSION: 1.0.0
      CONFIG_INPUT_QUEUE_URL: http://floci:4566/000000000000/gfr__sqs___config_input
    networks:
      - grants-ui-net
    volumes:
      - ./compose/config-broker-local:/home/node/config
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3012/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongodb:
    image: mongo:7.0
    networks:
      - grants-ui-net
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: ['mongod', '--replSet', 'mongoRepl', '--bind_ip', 'localhost,mongodb']
    restart: always

  mongo-ready:
    image: mongo:7.0
    networks: [grants-ui-net]
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PRIMARY: 'mongodb:27017'
      REPLSET: 'mongoRepl'
    volumes:
      - ./scripts/wait-for-replicaset.sh:/wait-for-replicaset.sh:ro
    entrypoint: ['/bin/bash', '/wait-for-replicaset.sh']

  floci:
    image: floci/floci:latest-compat
    ports:
      - '4566:4566'
    env_file:
      - 'compose/aws.env'
    environment:
      FLOCI_DEFAULT_REGION: eu-west-2
    volumes:
      - ./compose/floci/start.d:/etc/floci/init/start.d:ro
    healthcheck:
      test: ['CMD', 'stat', '/tmp/READY']
      interval: 3s
      start_period: 5s
      retries: 20
    networks:
      - grants-ui-net

volumes:
  mongodb-data:
  mongodb-config:

networks:
  grants-ui-net:
    driver: bridge
    name: grants-ui-net
